name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: 'Deploy to staging'
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy dev (auto on main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run DB migrations
        env:
          DB_URL: ${{ secrets.DB_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          ./scripts/migrate.sh "$DB_URL"

      - name: Deploy app
        env:
          DB_URL: ${{ secrets.DB_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          IMAGE: ${{ vars.REGISTRY_HOST }}/${{ github.repository }}:${{ github.sha }}
          K8S_NAMESPACE: dev
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" set image deployment/app app="$IMAGE" --record

      - name: Health check + rollback on failure
        env:
          K8S_NAMESPACE: dev
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          set +e
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/app --timeout=180s
          rollout_status=$?
          http_status=$(curl -sS -o /dev/null -w '%{http_code}' "$HEALTHCHECK_URL")
          if [ "$rollout_status" -ne 0 ] || [ "$http_status" -ge 400 ]; then
            echo "Health check failed (rollout=$rollout_status, http=$http_status). Rolling back..."
            kubectl -n "$K8S_NAMESPACE" rollout undo deployment/app
            kubectl -n "$K8S_NAMESPACE" rollout status deployment/app --timeout=180s
            exit 1
          fi

  deploy-staging:
    name: Deploy staging (manual + approval)
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_staging == true
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run DB migrations
        env:
          DB_URL: ${{ secrets.DB_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          ./scripts/migrate.sh "$DB_URL"

      - name: Deploy app
        env:
          DB_URL: ${{ secrets.DB_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          IMAGE: ${{ vars.REGISTRY_HOST }}/${{ github.repository }}:${{ github.sha }}
          K8S_NAMESPACE: staging
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" set image deployment/app app="$IMAGE" --record

      - name: Health check + rollback on failure
        env:
          K8S_NAMESPACE: staging
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          set +e
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/app --timeout=180s
          rollout_status=$?
          http_status=$(curl -sS -o /dev/null -w '%{http_code}' "$HEALTHCHECK_URL")
          if [ "$rollout_status" -ne 0 ] || [ "$http_status" -ge 400 ]; then
            echo "Health check failed (rollout=$rollout_status, http=$http_status). Rolling back..."
            kubectl -n "$K8S_NAMESPACE" rollout undo deployment/app
            kubectl -n "$K8S_NAMESPACE" rollout status deployment/app --timeout=180s
            exit 1
          fi

  deploy-prod:
    name: Deploy prod (tag + protected environment)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run DB migrations
        env:
          DB_URL: ${{ secrets.DB_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          ./scripts/migrate.sh "$DB_URL"

      - name: Deploy app
        env:
          DB_URL: ${{ secrets.DB_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          IMAGE: ${{ vars.REGISTRY_HOST }}/${{ github.repository }}:${{ github.ref_name }}
          K8S_NAMESPACE: prod
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" set image deployment/app app="$IMAGE" --record

      - name: Health check + rollback on failure
        env:
          K8S_NAMESPACE: prod
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          set +e
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/app --timeout=240s
          rollout_status=$?
          http_status=$(curl -sS -o /dev/null -w '%{http_code}' "$HEALTHCHECK_URL")
          if [ "$rollout_status" -ne 0 ] || [ "$http_status" -ge 400 ]; then
            echo "Health check failed (rollout=$rollout_status, http=$http_status). Rolling back..."
            kubectl -n "$K8S_NAMESPACE" rollout undo deployment/app
            kubectl -n "$K8S_NAMESPACE" rollout status deployment/app --timeout=240s
            exit 1
          fi
